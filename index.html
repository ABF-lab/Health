<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sehat Ledger — Active Bengaluru Foundation</title>
<meta name="description" content="Offline-first NCD screening for community health volunteers. Turns every confirmed referral into measurable zakat preserved.">
<meta name="theme-color" content="#0A0A0B">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sehat Ledger">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preload" href="fonts/inter.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Lucide sprite. Thin stroke, no fills. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-plus"><path d="M12 5v14M5 12h14"/></g>
  <g id="i-users"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></g>
  <g id="i-message"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></g>
  <g id="i-chart"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.8L7 14.3"/></g>
  <g id="i-settings"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>
</defs></svg>

<!-- Backdrop as a real fixed element, not a body background.
     background-attachment:fixed is ignored by Chrome on Android, which makes
     `cover` size against the full scrolling document instead of the viewport.
     On a portrait phone that crops a landscape image down to its dark centre. -->
<div class="backdrop" aria-hidden="true"></div>

<div class="app">

  <!-- Mobile only: the sidebar becomes a tab bar, so branding moves here -->
  <header class="mobile-header">
    <img class="mobile-logo" src="assets/abf-logo.png" alt="Active Bengaluru Foundation">
    <button class="hdr-avatar" id="mAvatar" aria-label="Volunteer profile"></button>
  </header>

  <!-- ===================== Sidebar ===================== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/abf-logo.png" alt="Active Bengaluru Foundation">
    </div>

    <nav class="nav" role="tablist" aria-label="Sections">
      <button class="nav-item" role="tab" data-view="screen" aria-selected="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><use href="#i-plus"/></svg>
        <span>Screen</span>
      </button>
      <button class="nav-item" role="tab" data-view="records" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><use href="#i-users"/></svg>
        <span>Records</span>
      </button>
      <button class="nav-item" role="tab" data-view="followups" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><use href="#i-message"/></svg>
        <span>Follow-up</span>
        <span class="nav-badge" id="fuBadge" hidden>0</span>
      </button>
      <button class="nav-item" role="tab" data-view="ledger" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><use href="#i-chart"/></svg>
        <span>Ledger</span>
      </button>
      <button class="nav-item" role="tab" data-view="settings" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><use href="#i-settings"/></svg>
        <span>Settings</span>
      </button>
    </nav>

    <button class="sidebar-profile" id="profileBtn">
      <span class="profile-avatar" id="profileAvatar"></span>
      <span class="profile-text">
        <span class="profile-name" id="profileName">Volunteer</span>
        <span class="profile-role">Screening volunteer</span>
      </span>
    </button>
  </aside>

  <!-- ===================== Content ===================== -->
  <div class="content">
    <main class="page">

      <section class="view active" id="view-screen" role="tabpanel">
        <div id="screenFlow"></div>
      </section>

      <section class="view" id="view-records" role="tabpanel">
        <div class="page-title">
          <h1>Records</h1>
          <p>Stored on this device only. Nothing has left the phone.</p>
        </div>
        <div class="toolbar">
          <input class="input" id="recordSearch" type="search" placeholder="Search by name or centre" autocomplete="off">
          <div class="segmented seg-4" id="recordFilter">
            <button aria-pressed="true" data-filter="all">All</button>
            <button aria-pressed="false" data-filter="flagged">Flagged</button>
            <button aria-pressed="false" data-filter="pending">Pending</button>
            <button aria-pressed="false" data-filter="confirmed">In care</button>
          </div>
        </div>
        <div id="recordList"></div>
      </section>

      <section class="view" id="view-followups" role="tabpanel">
        <div class="page-title">
          <h1>Follow-up</h1>
          <p>A referral handed over is not an outcome. The loop closes when someone reaches a doctor.</p>
        </div>
        <div id="followupList"></div>
      </section>

      <section class="view" id="view-ledger" role="tabpanel">
        <div class="page-title">
          <h1>Zakat ledger</h1>
          <p>What the fund did not have to spend, counted only once care is confirmed.</p>
        </div>
        <div id="ledgerBody"></div>
      </section>

      <section class="view" id="view-settings" role="tabpanel">
        <div class="page-title">
          <h1>Settings</h1>
          <p>Configuration for this device.</p>
        </div>
        <div id="settingsBody"></div>
      </section>

    </main>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div id="sheetRoot"></div>

<script type="module" src="app.js"></script>
</body>
</html>
